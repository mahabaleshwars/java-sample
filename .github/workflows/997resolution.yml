name: "Repro Issue 997 - sudo uses wrong JDK"

on:
  workflow_dispatch:

jobs:
  repro-sudo-java-version:
    name: "${{ matrix.distribution }} JDK 25 sudo test - ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04]
        distribution: ['liberica', 'temurin', 'zulu']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v5
        id: setup-java
        with:
          java-version: '25'
          distribution: ${{ matrix.distribution }}

      - name: "Step 1: Verify Java 25 without sudo (baseline)"
        run: |
          echo "=== Without sudo ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "which java: $(which java)"
          java -version
          javac -version

      - name: "Step 2: Verify Java version with sudo (expect bug)"
        run: |
          echo "=== With sudo ==="
          echo "Sudo JAVA_HOME: $(sudo bash -c 'echo $JAVA_HOME')"
          echo "Sudo which java: $(sudo which java)"
          sudo java -version
          sudo javac -version

      - name: "Step 3: Compare user vs sudo environments"
        run: |
          echo "=== Environment Comparison ==="
          echo "User JAVA_HOME : $JAVA_HOME"
          echo "Sudo JAVA_HOME : $(sudo bash -c 'echo $JAVA_HOME')"
          echo ""
          echo "User which java: $(which java)"
          echo "Sudo which java: $(sudo which java)"
          echo ""
          echo "User PATH: $PATH"
          echo "Sudo PATH: $(sudo bash -c 'echo $PATH')"

      - name: "Step 4: Reproduce javac target release failure"
        run: |
          echo "=== Simulating: sudo javac with target 25 ==="
          USER_JAVAC_VERSION=$(javac -version 2>&1)
          SUDO_JAVAC_VERSION=$(sudo javac -version 2>&1)
          echo "User javac: $USER_JAVAC_VERSION"
          echo "Sudo javac: $SUDO_JAVAC_VERSION"
          if echo "$SUDO_JAVAC_VERSION" | grep -q "25"; then
            echo "✅ sudo javac is version 25"
          else
            echo "❌ BUG REPRODUCED: sudo javac is NOT version 25"
            echo "   sudo sees: $SUDO_JAVAC_VERSION"
            echo "   user sees: $USER_JAVAC_VERSION"
            exit 1
          fi

      - name: "Step 5: Reproduce with sudo mvn compile"
        run: |
          echo "=== Simulating: sudo mvn compile ==="
          echo "Without sudo (should work):"
          mvn compile -q -B || echo "mvn compile failed (may need deps, that is ok)"
          echo ""
          echo "With sudo (should show wrong JDK):"
          sudo mvn compile -q -B 2>&1 || echo "sudo mvn compile failed as expected (wrong JDK or missing mvn)"

      - name: "Step 6: Workaround - sudo -E preserves env"
        run: |
          echo "=== Workaround 1: sudo -E (preserve environment) ==="
          sudo -E java -version
          sudo -E javac -version

      - name: "Step 7: Workaround - explicit env passthrough"
        run: |
          echo "=== Workaround 2: explicit JAVA_HOME and PATH ==="
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" java -version
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" javac -version
