name: Validate sudo Java workarounds

on:
  workflow_dispatch:

jobs:
  sudo-java-workarounds:
    name: sudo workarounds - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup-java
        uses: ./
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Java version (no sudo baseline)
        run: |
          echo "=== Baseline (no sudo) ==="
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1
          javac -version 2>&1

      - name: Show default sudo behavior (expected to use system Java)
        run: |
          echo "=== Default sudo (env is reset — expect system Java) ==="
          sudo java -version 2>&1 || true
          sudo javac -version 2>&1 || true

      # Workaround 1: Pass both JAVA_HOME and PATH explicitly
      - name: 'Workaround 1: sudo JAVA_HOME=... PATH=...'
        run: |
          echo "=== Workaround 1: explicit env passthrough ==="
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" java -version 2>&1
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" javac -version 2>&1
          # Verify the version matches what setup-java configured
          ACTUAL=$(sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" java -version 2>&1 | head -1)
          echo "Actual: $ACTUAL"
          echo "$ACTUAL" | grep -q "21" && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }

      # Workaround 2: sudo -E env PATH="$PATH"
      - name: 'Workaround 2: sudo -E env PATH=...'
        run: |
          echo "=== Workaround 2: sudo -E with explicit PATH ==="
          sudo -E env PATH="$PATH" java -version 2>&1
          sudo -E env PATH="$PATH" javac -version 2>&1
          ACTUAL=$(sudo -E env PATH="$PATH" java -version 2>&1 | head -1)
          echo "Actual: $ACTUAL"
          echo "$ACTUAL" | grep -q "21" && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }

      # Workaround 3: Use $JAVA_HOME/bin/java explicitly
      - name: 'Workaround 3: full path via $JAVA_HOME/bin/...'
        run: |
          echo "=== Workaround 3: explicit JAVA_HOME path ==="
          sudo "$JAVA_HOME/bin/java" -version 2>&1
          sudo "$JAVA_HOME/bin/javac" -version 2>&1
          ACTUAL=$(sudo "$JAVA_HOME/bin/java" -version 2>&1 | head -1)
          echo "Actual: $ACTUAL"
          echo "$ACTUAL" | grep -q "21" && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }

      # Workaround 4: Avoid sudo entirely (preferred)
      - name: 'Workaround 4: no sudo (preferred)'
        run: |
          echo "=== Workaround 4: avoid sudo ==="
          java -version 2>&1
          javac -version 2>&1
          ACTUAL=$(java -version 2>&1 | head -1)
          echo "Actual: $ACTUAL"
          echo "$ACTUAL" | grep -q "21" && echo "✅ PASS" || { echo "��� FAIL"; exit 1; }

      # Bonus: Demonstrate the exact ant scenario from the issue
      - name: 'Simulate ant-like build tool under sudo'
        run: |
          echo "=== Simulating build tool under sudo ==="
          # Create a small Java file to compile
          echo 'public class Hello { public static void main(String[] args) { System.out.println("Java " + System.getProperty("java.version")); } }' > Hello.java

          echo "--- Without workaround (may fail or use wrong version) ---"
          sudo javac Hello.java 2>&1 || echo "(Expected: may fail if system Java doesn't support target)"

          echo "--- With workaround 1 ---"
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" javac Hello.java 2>&1
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" java Hello 2>&1

  # Windows should not be affected
  sudo-not-affected-windows:
    name: sudo not affected - windows-latest
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: setup-java
        uses: ./
        id: setup-java
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify Java version (Windows - no sudo issue)
        run: |
          echo "=== Windows baseline ==="
          java -version 2>&1
          javac -version 2>&1
        shell: bash
