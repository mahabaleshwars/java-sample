name: Test sudo Java Workarounds (Issue #997)

on:
  workflow_dispatch:

jobs:
  # ── Workaround 1: sudo -E — FAILS on GitHub Actions hosted runners ───────────
  workaround-1-sudo-E-FAILS:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — plain sudo (shows system Java 17)
        run: |
          echo "=== plain sudo (baseline) ==="
          sudo java -version

      - name: sudo -E — does NOT work on GitHub Actions (JAVA_HOME not in sudo env)
        run: |
          echo "=== sudo -E — expected Java 25, actual result ==="
          echo "JAVA_HOME in shell: $JAVA_HOME"
          sudo -E java -version
          echo "NOTE: sudo -E does not work here because JAVA_HOME is set via"
          echo "GITHUB_ENV (workflow env file), not exported into the sudo environment."

  # ── Workaround 2: Explicit passthrough — FAILS on GitHub Actions ─────────────
  workaround-2-explicit-passthrough-FAILS:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — plain sudo (shows system Java 17)
        run: |
          echo "=== plain sudo (baseline) ==="
          sudo java -version

      - name: Explicit passthrough — does NOT work reliably on GitHub Actions
        run: |
          echo "=== sudo JAVA_HOME/PATH passthrough — expected Java 25, actual result ==="
          echo "JAVA_HOME in shell: $JAVA_HOME"
          sudo JAVA_HOME="$JAVA_HOME" PATH="$PATH" java -version

  # ── Workaround 3: Full path via $JAVA_HOME — WORKS ✅ ────────────────────────
  workaround-3-full-path-WORKS:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — plain sudo (shows system Java 17)
        run: |
          echo "=== plain sudo (baseline) ==="
          sudo java -version

      - name: Fix — full path via $JAVA_HOME (bypasses PATH lookup entirely)
        run: |
          echo "=== sudo full path — should be Java 25 ==="
          echo "JAVA_HOME in shell: $JAVA_HOME"
          sudo "$JAVA_HOME/bin/java" -version

  # ── Workaround 4: Avoid sudo for Java steps — WORKS ✅ (preferred) ───────────
  workaround-4-avoid-sudo-WORKS:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — plain sudo (shows system Java 17)
        run: |
          echo "=== plain sudo (baseline) ==="
          sudo java -version

      - name: Fix — Java runs without sudo (should be Java 25)
        run: |
          echo "=== no sudo — should be Java 25 ==="
          java -version

      - name: sudo only for system-level commands, Java without sudo
        run: |
          echo "=== sudo only for apt, Java without sudo ==="
          sudo apt-get install -y curl
          java -version
