name: Verify sudo Java env workaround (#997)

on:
  workflow_dispatch:

jobs:
  # ── Ubuntu: verify the documented workarounds ────────────────────────────────
  ubuntu-sudo-workaround:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 25 (liberica) via setup-java@v5
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — java -version WITHOUT sudo (expect 25)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Baseline — java -version WITH plain sudo (expect system default, not 25)
        run: |
          echo "--- plain sudo java (env_reset drops JAVA_HOME/PATH) ---"
          sudo java -version
          sudo which java

      - name: Workaround A — sudo --preserve-env=JAVA_HOME,PATH (expect 25)
        run: |
          echo "--- sudo --preserve-env=JAVA_HOME,PATH java -version ---"
          sudo --preserve-env=JAVA_HOME,PATH java -version

      - name: Workaround B — sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" (expect 25)
        run: |
          echo '--- sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" java -version ---'
          sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" java -version

      - name: Assert both workarounds resolve to the setup-java JDK
        run: |
          set -euo pipefail
          expected="$("$JAVA_HOME/bin/java" -version 2>&1 | head -n1)"
          echo "expected: $expected"

          actual_a="$(sudo --preserve-env=JAVA_HOME,PATH java -version 2>&1 | head -n1)"
          echo "workaround A: $actual_a"
          [ "$expected" = "$actual_a" ] || { echo "Workaround A failed"; exit 1; }

          actual_b="$(sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" java -version 2>&1 | head -n1)"
          echo "workaround B: $actual_b"
          [ "$expected" = "$actual_b" ] || { echo "Workaround B failed"; exit 1; }

          echo "Both workarounds verified."

  # ── macOS: same behaviour on macOS runners ───────────────────────────────────
  macos-sudo-workaround:
    runs-on: macos-latest
    steps:
      - name: Setup Java 25 (liberica) via setup-java@v5
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: Baseline — java -version WITHOUT sudo (expect 25)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Baseline — java -version WITH plain sudo (expect system default, not 25)
        run: |
          echo "--- plain sudo java (env_reset drops JAVA_HOME/PATH) ---"
          sudo java -version

      - name: Workaround A — sudo --preserve-env=JAVA_HOME,PATH (expect 25)
        run: sudo --preserve-env=JAVA_HOME,PATH java -version

      - name: Workaround B — sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" (expect 25)
        run: sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" java -version

      - name: Assert both workarounds resolve to the setup-java JDK
        run: |
          set -euo pipefail
          expected="$("$JAVA_HOME/bin/java" -version 2>&1 | head -n1)"
          echo "expected: $expected"

          actual_a="$(sudo --preserve-env=JAVA_HOME,PATH java -version 2>&1 | head -n1)"
          [ "$expected" = "$actual_a" ] || { echo "Workaround A failed"; exit 1; }

          actual_b="$(sudo env "JAVA_HOME=$JAVA_HOME" "PATH=$PATH" java -version 2>&1 | head -n1)"
          [ "$expected" = "$actual_b" ] || { echo "Workaround B failed"; exit 1; }

          echo "Both workarounds verified."

  # ── Windows: control / sanity check (no sudo) ────────────────────────────────
  windows-control:
    runs-on: windows-latest
    steps:
      - name: Setup Java 25 (liberica) via setup-java@v5
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'liberica'

      - name: java -version (expect 25 — Windows unaffected)
        run: java -version
