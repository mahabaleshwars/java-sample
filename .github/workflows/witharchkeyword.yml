name: GraalVM Architecture x86

on:
   workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-java@fniephaus/graalvm
        with:
           distribution: 'graalvm'
           java-version: '21'
           architecture: x64
          
    
        
