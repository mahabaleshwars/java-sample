name: GraalVM SBT Cache 

on:
   workflow_dispatch:
   
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-java@fniephaus/graalvm
        with:
           distribution: 'graalvm'
           java-version: '21'
           cache: 'sbt'
           cache-dependency-path: build.sbt   
           
      - name: Build with SBT
        run: sbt package
