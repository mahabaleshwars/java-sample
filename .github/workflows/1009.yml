name: JBR version repro (#1008 / #1009)

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) End-to-end: run the real action across inputs & platforms,
  #    comparing the released v5 (buggy) vs the PR branch (fixed).
  # ─────────────────────────────────────────────────────────────
  action-e2e:
    name:   ${{ matrix.java-version }} | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version:
          - '25'                # bare major  -> satisfies() path (safe)
          - '25.0.3b508.4'            # full, no build -> satisfies() path (safe)
          - '25.0.3+480.61'     # full + build  -> compareBuild() path (the crash)
    steps:
      - name: Setup JBR (capture outcome, do not fail job)
        id: setup
        continue-on-error: true
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: ${{ matrix.java-version }}
       
      - name: Report result
        shell: bash
        run: |
          echo "java-version = ${{ matrix.java-version }}"   >> "$GITHUB_STEP_SUMMARY"
          echo "os           = ${{ matrix.os }}"             >> "$GITHUB_STEP_SUMMARY"
          echo "outcome      = ${{ steps.setup.outcome }}"   >> "$GITHUB_STEP_SUMMARY"
          echo "---"                                          >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.setup.outcome }}" = "success" ]; then
            echo "✅ resolved JAVA_HOME = ${JAVA_HOME:-<unset>}"
          else
            echo "❌ setup failed (see step log for the Invalid Version error)"
          fi

      - name: Prove Java actually works (only when setup succeeded)
        if: steps.setup.outcome == 'success'
        run: java -version

