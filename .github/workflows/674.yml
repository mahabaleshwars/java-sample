name: PR 674 - Alpine Linux E2E Validation

on:
  workflow_dispatch:

jobs:
  alpine-temurin-pinned:
    name: temurin ${{ matrix.version }} - alpine:${{ matrix.alpine }}
    runs-on: ubuntu-latest
    container:
      image: alpine:${{ matrix.alpine }}
    strategy:
      fail-fast: false
      matrix:
        alpine: ['3.19', '3.20', '3.21']
        version: ['8', '11', '17', '21']
    steps:
      - run: apk add --no-cache bash git tar
      - uses: actions/checkout@v6
      - name: Confirm Alpine
        run: cat /etc/alpine-release
      - id: setup-java
        uses: gdams/setup-java@alpine
        with:
          java-version: ${{ matrix.version }}
          distribution: temurin
      - name: Verify java runs on musl
        shell: bash
        run: |
          set -eux
          "$JAVA_HOME/bin/java" -version
          LDD_OUT="$(ldd "$JAVA_HOME/bin/java" 2>&1 || true)"
          echo "$LDD_OUT"
          if echo "$LDD_OUT" | grep -qi musl; then
            echo "✅ musl-linked Temurin (alpine-linux build)"
          elif echo "$LDD_OUT" | grep -qi "not found"; then
            echo "❌ glibc binary on Alpine — PR fix did not take effect"; exit 1
          fi
          "$JAVA_HOME/bin/java" -version 2>&1 | grep -E "version \"${{ matrix.version }}(\.|\")"

  alpine-sapmachine:
    name: sapmachine ${{ matrix.version }} - alpine
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    strategy:
      fail-fast: false
      matrix:
        version: ['17', '21']
    steps:
      - run: apk add --no-cache bash git tar
      - uses: actions/checkout@v6
      - uses: gdams/setup-java@alpine
        with:
          java-version: ${{ matrix.version }}
          distribution: sapmachine
      - shell: bash
        run: |
          "$JAVA_HOME/bin/java" -version 2>&1 | grep -E "version \"${{ matrix.version }}(\.|\")"

  alpine-latest-floating:
    name: temurin 21 - alpine:latest
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - run: apk add --no-cache bash git tar
      - uses: actions/checkout@v6
      - uses: gdams/setup-java@alpine
        with:
          java-version: '21'
          distribution: temurin
      - shell: bash
        run: |
          "$JAVA_HOME/bin/java" -version 2>&1 | grep -E 'version "21'

  alpine-no-git:
    name: alpine without git
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    steps:
      - name: Confirm git absent
        run: |
          if command -v git >/dev/null 2>&1; then
            echo "git unexpectedly present"; exit 1
          fi
      - uses: actions/checkout@v6
      - run: apk add --no-cache bash
      - uses: gdams/setup-java@alpine
        with:
          java-version: '17'
          distribution: temurin
      - shell: bash
        run: |
          "$JAVA_HOME/bin/java" -version 2>&1 | grep -E 'version "17'

  regular-linux-regression:
    name: temurin ${{ matrix.version }} - ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['8', '11', '17', '21']
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-java@alpine
        with:
          java-version: ${{ matrix.version }}
          distribution: temurin
      - name: Confirm glibc (NOT musl)
        shell: bash
        run: |
          set -eux
          LDD_OUT="$(ldd "$JAVA_HOME/bin/java" 2>&1)"
          echo "$LDD_OUT"
          if echo "$LDD_OUT" | grep -qi musl; then
            echo "❌ got Alpine build on Ubuntu"; exit 1
          fi
          "$JAVA_HOME/bin/java" -version

  cross-platform-regression:
    name: temurin 17 - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-java@alpine
        with:
          java-version: '17'
          distribution: temurin
      - run: java -version
        shell: bash

  alpine-arm64:
    name: temurin 21 - alpine arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.20
    steps:
      - run: apk add --no-cache bash git tar file
      - uses: actions/checkout@v6
      - uses: gdams/setup-java@alpine
        with:
          java-version: '21'
          distribution: temurin
      - shell: bash
        run: |
          set -eux
          file "$JAVA_HOME/bin/java"
          ldd "$JAVA_HOME/bin/java" 2>&1 | grep -qi musl
          "$JAVA_HOME/bin/java" -version

  detection-unit-check-alpine:
    name: getPlatformOption() == alpine-linux
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    steps:
      - run: apk add --no-cache bash git nodejs npm
      - uses: actions/checkout@v6
        with:
          repository: gdams/setup-java
          ref: alpine
          path: setup-java
      - working-directory: setup-java
        run: npm ci
      - working-directory: setup-java
        shell: sh
        run: |
          node -e "
            const fs = require('fs');
            const p = fs.existsSync('./lib/distributions/temurin/installer.js')
              ? './lib/distributions/temurin/installer'
              : './dist/setup/index.js';
            const m = require(p);
            const C = m.TemurinDistribution || (m.default && m.default.TemurinDistribution);
            if (!C) { console.error('no class in', p); process.exit(2); }
            const d = new C({ version: '21', architecture: 'x64', packageType: 'jdk', checkLatest: false });
            const r = d.getPlatformOption();
            console.log('platform =', r);
            if (r !== 'alpine-linux') process.exit(1);
          "

  detection-unit-check-linux:
    name: getPlatformOption() == linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          repository: gdams/setup-java
          ref: alpine
          path: setup-java
      - working-directory: setup-java
        run: npm ci
      - working-directory: setup-java
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = fs.existsSync('./lib/distributions/temurin/installer.js')
              ? './lib/distributions/temurin/installer'
              : './dist/setup/index.js';
            const m = require(p);
            const C = m.TemurinDistribution || (m.default && m.default.TemurinDistribution);
            const d = new C({ version: '21', architecture: 'x64', packageType: 'jdk', checkLatest: false });
            const r = d.getPlatformOption();
            console.log('platform =', r);
            if (r !== 'linux') process.exit(1);
          "
