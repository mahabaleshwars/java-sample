name: "Verify Issue 997 workarounds"

on:
  workflow_dispatch:

jobs:
  verify-workarounds:
    name: "${{ matrix.distribution }} JDK 25 sudo workarounds - ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04]
        distribution: ['liberica', 'temurin', 'zulu']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v5
        id: setup-java
        with:
          java-version: '25'
          distribution: ${{ matrix.distribution }}

      # -------------------------------------------------------------------
      # Baseline: show the bug
      # -------------------------------------------------------------------
      - name: "Baseline: no-sudo vs plain sudo (shows fallback to Temurin 17)"
        run: |
          echo "=== No sudo ==="
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          java -version
          echo ""
          echo "=== Plain sudo (expected: runner default, typically Temurin 17) ==="
          echo "Sudo JAVA_HOME: $(sudo bash -c 'echo $JAVA_HOME')"
          sudo which java
          sudo java -version
          sudo javac -version

      # -------------------------------------------------------------------
      # Workaround 1: sudo --preserve-env + invoke via $JAVA_HOME/bin
      # NOTE: sudo's secure_path overrides PATH on Ubuntu even with
      # --preserve-env=PATH, so we must call the absolute binary path.
      # -------------------------------------------------------------------
      - name: "Workaround 1: sudo --preserve-env=JAVA_HOME (call via \\$JAVA_HOME/bin)"
        run: |
          echo "=== sudo --preserve-env=JAVA_HOME \$JAVA_HOME/bin/java ==="
          sudo --preserve-env=JAVA_HOME "$JAVA_HOME/bin/java" -version
          sudo --preserve-env=JAVA_HOME "$JAVA_HOME/bin/javac" -version

          VER=$(sudo --preserve-env=JAVA_HOME "$JAVA_HOME/bin/javac" -version 2>&1)
          echo "sudo javac -> $VER"
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 1 OK" || { echo "❌ Workaround 1 failed"; exit 1; }

      - name: "Workaround 1b: sudo -E + \\$JAVA_HOME/bin/java"
        run: |
          sudo -E "$JAVA_HOME/bin/java" -version
          sudo -E "$JAVA_HOME/bin/javac" -version

          VER=$(sudo -E "$JAVA_HOME/bin/javac" -version 2>&1)
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 1b OK" || { echo "❌ Workaround 1b failed"; exit 1; }

      # -------------------------------------------------------------------
      # Workaround 2: explicit env passthrough via `sudo env ...`
      # Still must invoke the binary by absolute path because secure_path wins.
      # -------------------------------------------------------------------
      - name: "Workaround 2: sudo env JAVA_HOME=... \\$JAVA_HOME/bin/java"
        run: |
          sudo env "JAVA_HOME=$JAVA_HOME" "$JAVA_HOME/bin/java" -version
          sudo env "JAVA_HOME=$JAVA_HOME" "$JAVA_HOME/bin/javac" -version

          VER=$(sudo env "JAVA_HOME=$JAVA_HOME" "$JAVA_HOME/bin/javac" -version 2>&1)
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 2 OK" || { echo "❌ Workaround 2 failed"; exit 1; }

      # -------------------------------------------------------------------
      # Workaround 3: relax sudoers (env_keep + secure_path)
      # This is the ONLY way to make a *bare* `sudo java` resolve correctly,
      # because it replaces the runner's secure_path.
      # -------------------------------------------------------------------
      - name: "Workaround 3: patch sudoers so bare `sudo java` works"
        run: |
          sudo tee /etc/sudoers.d/keep-java > /dev/null <<EOF
          Defaults env_keep += "JAVA_HOME"
          Defaults secure_path="$JAVA_HOME/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          EOF
          sudo chmod 440 /etc/sudoers.d/keep-java

          echo "=== Plain sudo now respects setup-java JDK ==="
          sudo bash -c 'echo JAVA_HOME=$JAVA_HOME; which java; java -version; javac -version'

          VER=$(sudo javac -version 2>&1)
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 3 OK" || { echo "❌ Workaround 3 failed"; exit 1; }

      - name: "Reset sudoers override"
        run: sudo rm -f /etc/sudoers.d/keep-java

      # -------------------------------------------------------------------
      # Workaround 4: simply don't use sudo for the Java invocation
      # -------------------------------------------------------------------
      - name: "Workaround 4: no sudo = correct JDK"
        run: |
          javac -version
          VER=$(javac -version 2>&1)
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 4 OK" || { echo "❌ Workaround 4 failed"; exit 1; }

      # -------------------------------------------------------------------
      # Workaround 5: use JAVA_HOME_25_X64 inside sudo
      # This works because JAVA_HOME_25_X64 lives in /etc/environment,
      # which sudo reads for a fresh login shell.
      # Still must call the absolute binary path.
      # -------------------------------------------------------------------
      - name: "Workaround 5: use JAVA_HOME_25_X64 inside sudo"
        run: |
          echo "User side JAVA_HOME_25_X64=$JAVA_HOME_25_X64"
          sudo bash -c 'echo Sudo side JAVA_HOME_25_X64=$JAVA_HOME_25_X64'

          sudo bash -c '
            export JAVA_HOME="$JAVA_HOME_25_X64"
            "$JAVA_HOME/bin/java"  -version
            "$JAVA_HOME/bin/javac" -version
          '

          VER=$(sudo bash -c 'export JAVA_HOME="$JAVA_HOME_25_X64"; "$JAVA_HOME/bin/javac" -version' 2>&1)
          echo "$VER" | grep -q " 25" && echo "✅ Workaround 5 OK" || { echo "❌ Workaround 5 failed"; exit 1; }

      # -------------------------------------------------------------------
      # Real-world scenario: ant invoked under sudo (like the qzind/tray build)
      # ant's launcher honours $JAVA_HOME, so preserve-env is enough here —
      # no PATH trap because ant doesn't look up `java` on PATH.
      # -------------------------------------------------------------------
      - name: "Applied example: sudo ant with --preserve-env=JAVA_HOME"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ant

          cat > build.xml <<'XML'
          <project name="jdk-check" default="show">
            <target name="show">
              <echo message="ant java.version = ${java.version}"/>
              <echo message="ant java.home    = ${java.home}"/>
            </target>
          </project>
          XML

          echo "=== Plain sudo ant (buggy) ==="
          sudo ant -q show || true

          echo ""
          echo "=== sudo --preserve-env=JAVA_HOME ant (fixed) ==="
          VER=$(sudo --preserve-env=JAVA_HOME ant -q show 2>&1 | tee /dev/stderr)
          echo "$VER" | grep -Eq "java.version = 25" \
            && echo "✅ ant picks up JDK 25 under sudo" \
            || { echo "❌ ant still wrong under sudo"; exit 1; }
